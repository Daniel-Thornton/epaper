<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="/static/win95.css">
</head>
<body>
<div class="window">
  <div class="title-bar">
    <img src="/static/icons/todo_list.png" class="title-icon" alt="">
    <span class="title">To-Do List</span>
    <div class="win-btn">&#8212;</div>
    <div class="win-btn">&#9744;</div>
    <div class="win-btn">&#10005;</div>
  </div>
  <div class="menu-bar"><span>File</span><span>Edit</span></div>

  <div class="content">
    <!-- New Task action — index 0, always first -->
    <div class="todo-row new-action {{ 'selected' if selected == 0 else '' }}">
      {% if selected == 0 %}<img src="/static/icons/cursor_hand.png" class="list-cursor" alt="">{% endif %}
      <div class="checkbox" style="font-size:16px; font-weight:bold">+</div>
      <span>New Task &nbsp;<span style="font-size:11px; opacity:0.7">(voice or type)</span></span>
    </div>

    {% for item in todos %}
    <div class="todo-row {{ 'selected' if loop.index == selected else '' }}">
      {% if loop.index == selected %}<img src="/static/icons/cursor_hand.png" class="list-cursor" alt="">{% endif %}
      <div class="checkbox">{% if item.done %}&#10003;{% endif %}</div>
      <span class="todo-text {{ 'done' if item.done else '' }}">{{ item.text }}</span>
    </div>
    {% endfor %}
  </div>

  <div class="status-bar">
    <span class="status-panel">{{ done }} / {{ todos|length }} done</span>
    <span class="status-panel">ACCEPT toggle/new &nbsp; BACK home</span>
  </div>
</div>
</body>
</html>
