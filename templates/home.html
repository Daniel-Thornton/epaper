<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="/static/win95.css">
</head>
<body>
<div id="desktop">
  <div class="icon-grid">
    {% for label, screen in apps %}
    {% set i = loop.index0 %}
    <div class="icon-cell {{ 'selected' if i == selected else '' }}">
      <div class="icon-img-wrap">
        <img src="/static/icons/{{ icon_files[i] }}" class="app-icon" alt="{{ label }}">
        <img src="/static/icons/Shortcut.png" class="shortcut-badge" alt="">
        {% if i == selected %}
        <img src="/static/icons/cursor_hand.png" class="icon-cursor" alt="">
        {% endif %}
      </div>
      <span class="icon-label">{{ label }}</span>
    </div>
    {% endfor %}
  </div>
</div>

<div class="taskbar raised">
  <div class="start-btn raised">
    <img src="/static/icons/start.png" alt=""> Start
  </div>
  <div style="flex:1"></div>
  {% if battery_pct >= 0 %}
  <div class="batt-widget">
    <div class="batt-icon">
      <div class="batt-body">
        <div class="batt-fill" style="width:{{ battery_pct }}%"></div>
      </div>
      <div class="batt-nub"></div>
    </div>
    <span class="batt-pct">{{ battery_pct }}%</span>
    {% if battery_charging %}<span class="batt-sym">&#9889;</span>{% endif %}
    {% if not battery_ac_ok %}<span class="batt-sym batt-alert">!</span>{% endif %}
  </div>
  {% endif %}
  <div class="taskbar-clock sunken">{{ clock }}</div>
</div>
</body>
</html>
