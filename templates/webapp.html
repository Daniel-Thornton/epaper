<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="/static/win95.css">
</head>
<body>
<div class="window">
  <div class="title-bar">
    <img src="/static/icons/{{ icon }}.png" class="title-icon" alt="">
    <span class="title">{{ title }}</span>
    <div class="win-btn">&#8212;</div>
    <div class="win-btn">&#9744;</div>
    <div class="win-btn">&#10005;</div>
  </div>
  <div class="menu-bar"><span>File</span><span>Open in Browser</span></div>

  <div class="content">
    <div class="qr-screen">
      <div class="qr-app-name">{{ title }}</div>
      <div class="qr-desc">{{ desc }}</div>
      <img class="qr-code" src="data:image/png;base64,{{ qr }}" alt="QR code for {{ title }}">
      <div style="font-size:12px; color:#404040">Scan to open on your phone</div>
      <div class="qr-url">{{ url }}</div>
    </div>
  </div>

  <div class="status-bar">
    <span class="status-panel">BACK home</span>
  </div>
</div>
</body>
</html>
